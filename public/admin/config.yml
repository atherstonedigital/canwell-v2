  # ----- Articles -----
  - name: articles
    label: "Inspiration articles"
    folder: content/articles
    create: true
    slug: "{{slug}}"
    identifier_field: title
    summary: "{{title}} — {{date_published}}"
    fields:
      - { name: title, widget: string }
      - { name: meta_title, widget: string }
      - { name: meta_description, widget: text }
      - { name: excerpt, widget: text, hint: "Shown on the inspiration hub list page." }
      - { name: image, label: Header image, widget: image, required: false, hint: "Optional. Sits to the right of the article title." }
      - { name: category, widget: string, hint: "e.g. Curtains, Carpets, Furniture" }
      - { name: date_published, widget: datetime }
      - { name: read_time, widget: string, hint: "e.g. '5 min read'" }
      - { name: is_placeholder, widget: boolean, default: false, hint: "Tick if this is a draft outline. Shows a 'Draft' pill on the article and the hub." }
      - { name: body, widget: markdown }
